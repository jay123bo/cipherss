:root {
  --void: #04050a;
  --deep: #080c18;
  --panel: #0c1120;
  --border: rgba(180,140,60,0.18);
  --gold: #c9a84c;
  --gold2: #f0d080;
  --goldglow: rgba(201,168,76,0.25);
  --text: #d4c5a0;
  --dim: #5a5040;
  --bright: #f0e8d0;
  --danger: #c04040;
  --user-bg: #0f1828;
  --ai-bg: #080e1a;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: var(--void);
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 17px;
  overflow: hidden;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
  opacity: 0.4;
}

/* ── RADIAL GLOW ── */
body::after {
  content: '';
  position: fixed;
  width: 900px; height: 900px;
  background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 65%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 0;
}

/* ── SETUP SCREEN ── */
#setup {
  position: fixed; inset: 0;
  background: var(--void);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}

.setup-box {
  text-align: center;
  max-width: 460px;
  width: 90%;
  padding: 56px 48px;
  border: 1px solid var(--border);
  background: var(--deep);
  position: relative;
  animation: fadeIn 0.8s ease;
}

/* Corner ornaments */
.setup-box::before, .setup-box::after {
  content: '✦';
  position: absolute;
  color: var(--gold);
  font-size: 18px;
  opacity: 0.5;
}
.setup-box::before { top: 14px; left: 18px; }
.setup-box::after { bottom: 14px; right: 18px; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.cipher-logo {
  font-family: 'Jokerman', serif;
  font-size: 48px;
  color: var(--gold);
  letter-spacing: 4px;
  text-shadow: 0 0 40px var(--goldglow), 0 0 80px rgba(201,168,76,0.1);
  margin-bottom: 4px;
  line-height: 1;
}

.cipher-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  letter-spacing: 6px;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 36px;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.divider span {
  color: var(--gold);
  font-size: 12px;
  opacity: 0.6;
}

.setup-text {
  font-size: 14px;
  color: var(--dim);
  line-height: 1.7;
  margin-bottom: 28px;
  font-style: italic;
}

.setup-text a {
  color: var(--gold);
  text-decoration: none;
  border-bottom: 1px solid rgba(201,168,76,0.3);
}

.key-input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(201,168,76,0.03);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 13px;
  outline: none;
  letter-spacing: 1px;
  margin-bottom: 16px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.key-input:focus {
  border-color: rgba(201,168,76,0.5);
  box-shadow: 0 0 20px rgba(201,168,76,0.08);
}
.key-input::placeholder { color: var(--dim); }

.enter-btn {
  width: 100%;
  padding: 15px;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-style: italic;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.enter-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
  z-index: -1;
}
.enter-btn:hover {
  color: var(--void);
}
.enter-btn:hover::before { transform: scaleX(1); }

.setup-note {
  margin-top: 16px;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 1px;
}

/* ── LAYOUT ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
  z-index: 1;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 36px;
  border-bottom: 1px solid var(--border);
  background: rgba(4,5,10,0.95);
  backdrop-filter: blur(8px);
  flex-shrink: 0;
}

.header-logo {
  font-family: 'Jokerman', serif;
  font-size: 28px;
  color: var(--gold);
  letter-spacing: 2px;
  text-shadow: 0 0 20px var(--goldglow);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  font-family: 'Cormorant Garamond', serif;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
}
.status-dot.live {
  background: #60d080;
  box-shadow: 0 0 8px #60d080;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.3; }
}

.gear-btn {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  transition: color 0.2s;
}
.gear-btn:hover { color: var(--gold); }

/* ── CHAT ── */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 36px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); }

/* Welcome */
.welcome-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  text-align: center;
  padding: 60px 20px;
  opacity: 0.5;
}
.welcome-screen .w-logo {
  font-family: 'Jokerman', serif;
  font-size: 64px;
  color: var(--gold);
  text-shadow: 0 0 60px var(--goldglow);
  margin-bottom: 10px;
  line-height: 1;
}
.welcome-screen .w-tagline {
  font-style: italic;
  font-size: 16px;
  color: var(--dim);
  letter-spacing: 3px;
}

/* Messages */
.msg-row {
  display: flex;
  gap: 16px;
  max-width: 860px;
  animation: msgIn 0.35s ease;
}
@keyframes msgIn {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}

.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.msg-row.ai .msg-avatar {
  background: rgba(201,168,76,0.05);
}
.msg-row.ai .msg-avatar-inner {
  font-family: 'Jokerman', serif;
  font-size: 11px;
  color: var(--gold);
}
.msg-row.user .msg-avatar {
  background: rgba(255,255,255,0.03);
}
.msg-row.user .msg-avatar-inner {
  font-size: 12px;
  color: var(--dim);
}

.msg-content { max-width: calc(100% - 52px); }

.msg-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
.msg-row.user .msg-label { text-align: right; }

.msg-bubble {
  padding: 16px 20px;
  line-height: 1.75;
  font-size: 16px;
  border: 1px solid var(--border);
  position: relative;
}

.msg-row.ai .msg-bubble {
  background: var(--ai-bg);
  border-top-left-radius: 0;
}
.msg-row.user .msg-bubble {
  background: var(--user-bg);
  border-top-right-radius: 0;
  color: var(--bright);
}

/* Decorative corner on AI bubble */
.msg-row.ai .msg-bubble::before {
  content: '';
  position: absolute;
  top: 0; left: -1px;
  width: 3px; height: 32px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  opacity: 0.4;
}

/* Typing */
.typing-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 18px 20px;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.3;
  animation: dotBlink 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBlink {
  0%,100% { opacity:0.2; transform:scale(0.9); }
  50% { opacity:0.8; transform:scale(1.2); }
}

/* ── FOOTER ── */
footer {
  padding: 20px 36px 24px;
  border-top: 1px solid var(--border);
  background: rgba(4,5,10,0.97);
  flex-shrink: 0;
}

.input-wrap {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  border: 1px solid var(--border);
  padding: 10px 10px 10px 20px;
  background: var(--deep);
  transition: border-color 0.3s;
}
.input-wrap:focus-within {
  border-color: rgba(201,168,76,0.4);
}

#user-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--bright);
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  resize: none;
  max-height: 120px;
  min-height: 28px;
  line-height: 1.6;
  padding: 4px 0;
}
#user-input::placeholder { color: var(--dim); font-style: italic; }

#send-btn {
  width: 42px; height: 42px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--gold);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
#send-btn:hover {
  background: rgba(201,168,76,0.08);
  border-color: var(--gold);
}
#send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
#send-btn svg { width: 16px; height: 16px; fill: currentColor; }

.footer-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}
.footer-hint {
  font-size: 11px;
  color: var(--dim);
  font-style: italic;
  letter-spacing: 1px;
}
.footer-clear {
  font-size: 11px;
  color: var(--dim);
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.2s;
}
.footer-clear:hover { color: var(--gold); }

code {
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.15);
  padding: 2px 6px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  color: var(--gold2);
}
strong { color: var(--bright); font-weight: 600; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-box">
    <div class="cipher-logo">Cipher.AI</div>
    <div class="cipher-sub">Your Private Intelligence</div>
    <div class="divider"><span>✦</span></div>
    <p class="setup-text">
      Enter your Anthropic API key to unlock your personal AI.<br/>
      Get one free at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </p>
    <input class="key-input" id="api-key" type="password" placeholder="sk-ant-api03-···" autocomplete="off"/>
    <button class="enter-btn" onclick="initCipher()">Enter the Cipher</button>
    <p class="setup-note">🔒 Stored only in your browser — never shared</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-logo">Cipher.AI</div>
    <div class="header-right">
      <div class="status-pill">
        <div class="status-dot" id="sdot"></div>
        <span id="stext">Offline</span>
      </div>
      <button class="gear-btn" onclick="resetKey()" title="Change API key">⚙</button>
    </div>
  </header>

  <div id="chat">
    <div class="welcome-screen" id="welcome">
      <div class="w-logo">Cipher.AI</div>
      <div class="w-tagline">Begin your inquiry below</div>
    </div>
  </div>

  <footer>
    <div class="input-wrap">
      <textarea id="user-input" rows="1" placeholder="Ask anything…"></textarea>
      <button id="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="footer-meta">
      <span class="footer-hint">Enter to send · Shift+Enter for new line</span>
      <button class="footer-clear" onclick="clearChat()">Clear Chat</button>
    </div>
  </footer>
</div>

<script>
let KEY = '';
let history = [];
let busy = false;

window.onload = () => {
  const k = localStorage.getItem('cipher_k');
  if (k) { KEY = k; showApp(); }
};

function initCipher() {
  const v = document.getElementById('api-key').value.trim();
  if (!v.startsWith('sk-')) {
    document.getElementById('api-key').style.borderColor = '#c04040';
    document.getElementById('api-key').placeholder = 'Invalid key — should start with sk-ant-…';
    return;
  }
  KEY = v;
  localStorage.setItem('cipher_k', v);
  showApp();
}

function showApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('sdot').className = 'status-dot live';
  document.getElementById('stext').textContent = 'Active';
}

function resetKey() {
  localStorage.removeItem('cipher_k');
  location.reload();
}

async function sendMsg() {
  const el = document.getElementById('user-input');
  const txt = el.value.trim();
  if (!txt || busy) return;

  document.getElementById('welcome')?.remove();
  el.value = '';
  el.style.height = 'auto';

  addMsg('user', txt);
  history.push({ role: 'user', content: txt });

  const typing = addTyping();
  busy = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: 'You are Cipher.AI — a supremely intelligent, articulate personal AI. You are eloquent, precise, and thoughtful. You assist your user with anything they need, with elegance and depth.',
        messages: history.slice(-30)
      })
    });

    typing.remove();
    const data = await res.json();

    if (data.error) {
      addMsg('ai', '⚠ ' + data.error.message, true);
    } else {
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      addMsg('ai', reply);
    }
  } catch(e) {
    typing.remove();
    addMsg('ai', '⚠ Connection failed. Check your key or internet.', true);
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
  el.focus();
}

function addMsg(role, text, isErr = false) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  const label = role === 'ai' ? 'Cipher.AI' : 'You';
  const avatarInner = role === 'ai'
    ? '<span class="msg-avatar-inner">C</span>'
    : '<span class="msg-avatar-inner">◈</span>';

  const bubbleStyle = isErr ? 'color:#c06060;font-style:italic;' : '';

  row.innerHTML = `
    <div class="msg-avatar">${avatarInner}</div>
    <div class="msg-content">
      <div class="msg-label">${label}</div>
      <div class="msg-bubble" style="${bubbleStyle}">${fmt(text)}</div>
    </div>
  `;

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    <div class="msg-avatar"><span class="msg-avatar-inner">C</span></div>
    <div class="msg-content">
      <div class="msg-label">Cipher.AI</div>
      <div class="msg-bubble">
        <div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      </div>
    </div>
  `;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function fmt(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>');
}

function clearChat() {
  history = [];
  const chat = document.getElementById('chat');
  chat.innerHTML = `
    <div class="welcome-screen" id="welcome">
      <div class="w-logo">Cipher.AI</div>
      <div class="w-tagline">Session cleared — begin anew</div>
    </div>
  `;
}

document.addEventListener('keydown', e => {
  const inp = document.getElementById('user-input');
  if (e.key === 'Enter' && !e.shiftKey && document.activeElement === inp) {
    e.preventDefault();
    sendMsg();
  }
});

document.getElementById('api-key')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') initCipher();
});

document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 130) + 'px';
});
</script>
</body>
</html>
